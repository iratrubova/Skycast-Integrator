name: Swift Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Show Swift version
      run: swift --version
      
    - name: Build
      run: swift build -v
      
    - name: Run tests with output
      run: swift test -v 2>&1
      
    - name: Run tests (continue on error to see output)
      run: |
        set -o pipefail
        swift test 2>&1 | tee test_output.log
      continue-on-error: true
      
    - name: Upload test logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-logs
        path: test_output.log
